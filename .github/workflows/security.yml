name: Security Scanning

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Run weekly on Sundays at 05:00 UTC
    - cron: "0 5 * * 0"

jobs:
  gitleaks:
    name: Secret Scanning (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trivy:
    name: Vulnerability Scanning (Trivy)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          format: "table"
          trivyignores: ".trivyignore"

      - name: Run Trivy config scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "config"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          format: "table"

  dependency-audit:
    name: npm Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (production)
        shell: bash
        run: |
          # Run audit in JSON mode (exits non-zero when vulns found, so || true)
          npm audit --omit=dev --json > /tmp/audit.json 2>/dev/null || true

          # Check for high/critical vulns not in the allowlist.
          # Advisories with no fix in Next.js 14.x (require 15+ upgrade):
          #   GHSA-9g9p-9gw9-jx7f  Image Optimizer DoS
          #   GHSA-h25m-26qc-wcjf  HTTP deserialization DoS
          # TODO: Remove allowlist entries after upgrading to Next.js 15.
          cat > /tmp/audit-check.js << 'AUDIT_SCRIPT'
          const audit = JSON.parse(require('fs').readFileSync('/tmp/audit.json', 'utf8'));
          const allowlist = new Set([
            'GHSA-9g9p-9gw9-jx7f',
            'GHSA-h25m-26qc-wcjf',
          ]);
          const vulns = Object.entries(audit.vulnerabilities || {});
          const blocked = vulns.filter(([name, v]) => {
            const advisories = v.via.filter(ref => typeof ref === 'object');
            return advisories.some(a =>
              (a.severity === 'high' || a.severity === 'critical') &&
              !allowlist.has((a.url || '').split('/').pop())
            );
          });
          if (blocked.length > 0) {
            console.error('High/critical vulnerabilities found:');
            blocked.forEach(([name]) => console.error('  -', name));
            process.exit(1);
          }
          const allowed = vulns.length - blocked.length;
          if (allowed > 0) {
            console.log(allowed + ' known advisory(ies) allowlisted (pending Next.js 15 upgrade)');
          }
          console.log('npm audit passed');
          AUDIT_SCRIPT
          node /tmp/audit-check.js
